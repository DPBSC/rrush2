<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1434 1167" role="img" aria-labelledby="title desc">
  <title id="title">RRUSH heavyweight hoodie front</title>
  <desc id="desc">Front flat-lay view of a black RRUSH pullover hoodie with white chest logo on a light studio background.</desc>
  <defs>
    <radialGradient id="studio" cx="50%" cy="43%" r="72%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#f6f5f3"/>
      <stop offset="1" stop-color="#ecebea"/>
    </radialGradient>
    <linearGradient id="fabric" x1="0" x2="1" y1="0" y2="1">
